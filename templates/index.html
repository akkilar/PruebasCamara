<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Personas - RTSP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
        }

        .video-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .stat-card.alert {
            border-left-color: #ff4757;
            background: #ffe5e5;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }

        .stat-value.alert {
            color: #ff4757;
        }

        .alert-banner {
            background: #ff4757;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            display: none;
            text-align: center;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        .alert-banner.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .config-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .config-group label {
            font-weight: bold;
            color: #333;
        }

        .config-group input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            width: 80px;
            text-align: center;
        }

        .config-group input:focus {
            border-color: #667eea;
            outline: none;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #27ae60;
            animation: blink 1s infinite;
        }

        .status-indicator.disconnected {
            background: #e74c3c;
            animation: none;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 20px;
            }

            .stat-value {
                font-size: 28px;
            }

            .controls {
                flex-direction: column;
            }

            .btn, .config-group {
                width: 100%;
                justify-content: center;
            }

            .config-group input {
                width: 100px;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        .footer {
            background: #f8f9fa;
            padding: 15px;
            text-align: center;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📹 Monitor de Personas</h1>
            <p>Sistema de detección RTSP con YOLO | <span class="status-indicator" id="status"></span> En línea</p>
        </div>

        <div class="content">
            <div class="alert-banner" id="alertBanner"></div>

            <div class="video-container">
                <img id="videoStream" src="/video_feed" alt="Stream de video">
            </div>

            <div class="stats">
                <div class="stat-card" id="personasCard">
                    <div class="stat-label">Personas Detectadas</div>
                    <div class="stat-value" id="personasCount">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Esperadas</div>
                    <div class="stat-value" id="personasEsperadas">{{ personas_esperadas }}</div>
                </div>
            </div>

            <div class="controls">
                <div class="config-group">
                    <label for="personasInput">Fijar personas esperadas:</label>
                    <input type="number" id="personasInput" min="1" max="20" value="{{ personas_esperadas }}">
                    <button class="btn btn-primary" onclick="actualizarPersonas()">✓ Aplicar</button>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" onclick="location.reload()">🔄 Recargar</button>
            </div>
        </div>

        <div class="footer">
            IP Cámara: 192.168.3.149 | YOLO v8 Nano | Actualización en tiempo real
        </div>
    </div>

    <script>
        // Actualizar estado cada segundo
        setInterval(actualizarEstado, 1000);

        function actualizarEstado() {
            fetch('/status')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('personasCount').textContent = data.personas;
                    document.getElementById('personasEsperadas').textContent = data.esperadas;

                    const card = document.getElementById('personasCard');
                    const contador = document.getElementById('personasCount');
                    const alerta = document.getElementById('alertBanner');

                    if (data.alerta) {
                        card.classList.add('alert');
                        contador.classList.add('alert');
                        alerta.classList.add('show');
                        alerta.textContent = `⚠️ ¡ALERTA! Faltan ${data.esperadas - data.personas} persona(s)`;
                    } else {
                        card.classList.remove('alert');
                        contador.classList.remove('alert');
                        alerta.classList.remove('show');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('status').classList.add('disconnected');
                });
        }

        function actualizarPersonas() {
            const valor = document.getElementById('personasInput').value;
            if (valor < 1 || valor > 20) {
                alert('El número debe estar entre 1 y 20');
                return;
            }

            fetch(`/config/${valor}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('personasEsperadas').textContent = data.personas;
                    }
                })
                .catch(error => console.error('Error:', error));
        }

        // Ejecutar actualización inicial
        actualizarEstado();
    </script>
</body>
</html>
